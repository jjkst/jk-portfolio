<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1508"/>
      <stop offset="50%" style="stop-color:#2a2010"/>
      <stop offset="100%" style="stop-color:#201a0c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43B02A"/>
      <stop offset="50%" style="stop-color:#b44dca"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark base -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Circuit board grid -->
  <g stroke="#5a4820" stroke-width="0.5" opacity="0.4">
    <!-- Horizontal lines -->
    <line x1="0" y1="112" x2="1200" y2="112"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="337" x2="1200" y2="337"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="562" x2="1200" y2="562"/>
    <!-- Vertical lines -->
    <line x1="200" y1="0" x2="200" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="800" y1="0" x2="800" y2="675"/>
    <line x1="1000" y1="0" x2="1000" y2="675"/>
  </g>

  <!-- Circuit traces - glowing paths -->
  <g fill="none" stroke-width="1.5" opacity="0.3" filter="url(#neonGlow)">
    <!-- Left trace -->
    <path d="M 0,280 H 180 L 220,280 L 220,260 H 280" stroke="#43B02A"/>
    <circle cx="180" cy="280" r="3" fill="#43B02A"/>
    <!-- Right trace -->
    <path d="M 1200,280 H 1020 L 980,280 L 980,260 H 900" stroke="#FF6B35"/>
    <circle cx="1020" cy="280" r="3" fill="#FF6B35"/>
    <!-- Top trace -->
    <path d="M 600,0 V 100 L 590,120 V 200" stroke="#e0a030"/>
    <circle cx="600" cy="100" r="3" fill="#e0a030"/>
    <!-- Bottom left -->
    <path d="M 100,675 V 560 L 150,520 H 310" stroke="#43B02A"/>
    <circle cx="150" cy="520" r="3" fill="#43B02A"/>
    <!-- Bottom right -->
    <path d="M 1100,675 V 560 L 1050,520 H 890" stroke="#e0a030"/>
    <circle cx="1050" cy="520" r="3" fill="#e0a030"/>
    <!-- Cross traces -->
    <path d="M 280,380 V 430 H 310" stroke="#43B02A" opacity="0.5"/>
    <path d="M 900,380 V 430 H 870" stroke="#FF6B35" opacity="0.5"/>
  </g>

  <!-- Circuit nodes (solder points) -->
  <g fill="none" stroke-width="1" opacity="0.2">
    <circle cx="200" cy="112" r="5" stroke="#43B02A"/>
    <circle cx="400" cy="225" r="5" stroke="#e0a030"/>
    <circle cx="800" cy="225" r="5" stroke="#e0a030"/>
    <circle cx="1000" cy="112" r="5" stroke="#FF6B35"/>
    <circle cx="200" cy="450" r="5" stroke="#43B02A"/>
    <circle cx="600" cy="562" r="5" stroke="#e0a030"/>
    <circle cx="1000" cy="450" r="5" stroke="#FF6B35"/>
    <rect x="395" y="107" width="10" height="10" rx="1" stroke="#43B02A" opacity="0.15"/>
    <rect x="795" y="107" width="10" height="10" rx="1" stroke="#FF6B35" opacity="0.15"/>
  </g>

  <!-- Scanning line effect -->
  <rect x="0" y="330" width="1200" height="1" fill="#e0a030" opacity="0.08"/>
  <rect x="0" y="332" width="1200" height="3" fill="#e0a030" opacity="0.03"/>

  <!-- HEX data decoration -->
  <text x="30" y="30" font-family="Consolas, monospace" font-size="9" fill="#5a4820" opacity="0.5">0x43B0 0x2AB4 0x4DCA</text>
  <text x="1000" y="660" font-family="Consolas, monospace" font-size="9" fill="#5a4820" opacity="0.5">SYS.READY // v3.1.0</text>
  <text x="30" y="660" font-family="Consolas, monospace" font-size="9" fill="#5a4820" opacity="0.5">FRAMEWORK.INIT</text>

  <!-- Logo boxes - 3 logos -->
  <g filter="url(#shadow)">
    <g transform="translate(280, 200)">
      <rect x="0" y="0" width="160" height="160" rx="8" fill="#0a1a08"/>
      <rect x="0" y="0" width="160" height="160" rx="8" fill="none" stroke="#43B02A" stroke-width="2" opacity="0.8"/>
      <!-- Corner brackets -->
      <path d="M 4,25 V 4 H 25" fill="none" stroke="#43B02A" stroke-width="2" opacity="0.5"/>
      <path d="M 135,4 H 156 V 25" fill="none" stroke="#43B02A" stroke-width="2" opacity="0.5"/>
      <path d="M 156,135 V 156 H 135" fill="none" stroke="#43B02A" stroke-width="2" opacity="0.5"/>
      <path d="M 25,156 H 4 V 135" fill="none" stroke="#43B02A" stroke-width="2" opacity="0.5"/>
      <text x="80" y="98" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#43B02A" text-anchor="middle">Se</text>
    </g>
    <g transform="translate(510, 200)">
      <rect x="0" y="0" width="160" height="160" rx="8" fill="#1a0e25"/>
      <rect x="0" y="0" width="160" height="160" rx="8" fill="none" stroke="#b44dca" stroke-width="2" opacity="0.8"/>
      <path d="M 4,25 V 4 H 25" fill="none" stroke="#b44dca" stroke-width="2" opacity="0.5"/>
      <path d="M 135,4 H 156 V 25" fill="none" stroke="#b44dca" stroke-width="2" opacity="0.5"/>
      <path d="M 156,135 V 156 H 135" fill="none" stroke="#b44dca" stroke-width="2" opacity="0.5"/>
      <path d="M 25,156 H 4 V 135" fill="none" stroke="#b44dca" stroke-width="2" opacity="0.5"/>
      <text x="80" y="98" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#b44dca" text-anchor="middle">C#</text>
    </g>
    <g transform="translate(740, 200)">
      <rect x="0" y="0" width="160" height="160" rx="8" fill="#1a1008"/>
      <rect x="0" y="0" width="160" height="160" rx="8" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.8"/>
      <path d="M 4,25 V 4 H 25" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.5"/>
      <path d="M 135,4 H 156 V 25" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.5"/>
      <path d="M 156,135 V 156 H 135" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.5"/>
      <path d="M 25,156 H 4 V 135" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.5"/>
      <text x="80" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FF6B35" text-anchor="middle">Reqn</text>
      <text x="80" y="115" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffb088" text-anchor="middle">Roll</text>
    </g>
  </g>

  <!-- Tech tags -->
  <g transform="translate(290, 430)">
    <rect x="0" y="0" width="110" height="36" rx="4" fill="#43B02A" opacity="0.08" stroke="#43B02A" stroke-width="1" stroke-opacity="0.4"/>
    <text x="55" y="24" font-family="Consolas, monospace" font-size="13" font-weight="500" fill="#43B02A" text-anchor="middle">Selenium</text>
  </g>
  <g transform="translate(420, 430)">
    <rect x="0" y="0" width="70" height="36" rx="4" fill="#b44dca" opacity="0.08" stroke="#b44dca" stroke-width="1" stroke-opacity="0.4"/>
    <text x="35" y="24" font-family="Consolas, monospace" font-size="13" font-weight="500" fill="#b44dca" text-anchor="middle">C#</text>
  </g>
  <g transform="translate(510, 430)">
    <rect x="0" y="0" width="110" height="36" rx="4" fill="#FF6B35" opacity="0.08" stroke="#FF6B35" stroke-width="1" stroke-opacity="0.4"/>
    <text x="55" y="24" font-family="Consolas, monospace" font-size="13" font-weight="500" fill="#FF6B35" text-anchor="middle">Reqnroll</text>
  </g>
  <g transform="translate(640, 430)">
    <rect x="0" y="0" width="80" height="36" rx="4" fill="#23D96C" opacity="0.06" stroke="#23D96C" stroke-width="1" stroke-opacity="0.3"/>
    <text x="40" y="24" font-family="Consolas, monospace" font-size="13" font-weight="500" fill="#23D96C" text-anchor="middle">BDD</text>
  </g>
</svg>
