<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0410"/>
      <stop offset="40%" style="stop-color:#140a1e"/>
      <stop offset="100%" style="stop-color:#0e1020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="80%" r="45%">
      <stop offset="0%" style="stop-color:#DD0031;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#DD0031;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#3178C6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="30%">
      <stop offset="0%" style="stop-color:#339933;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#339933;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
    </pattern>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DD0031"/>
      <stop offset="50%" style="stop-color:#3178C6"/>
      <stop offset="100%" style="stop-color:#339933"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="100" cy="120" r="3" fill="#DD0031" opacity="0.6"/>
  <circle cx="1100" cy="90" r="2" fill="#3178C6" opacity="0.5"/>
  <circle cx="180" cy="580" r="4" fill="#339933" opacity="0.4"/>
  <circle cx="990" cy="560" r="3" fill="#DD0031" opacity="0.3"/>
  <rect x="60" y="270" width="40" height="40" rx="8" fill="none" stroke="#DD0031" stroke-width="1" opacity="0.15" transform="rotate(20 80 290)"/>
  <rect x="1085" y="450" width="50" height="50" rx="10" fill="none" stroke="#3178C6" stroke-width="1" opacity="0.12" transform="rotate(-15 1110 475)"/>
  <polygon points="1050,120 1070,160 1030,160" fill="none" stroke="#339933" stroke-width="1" opacity="0.12"/>
  <rect x="400" y="138" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <g filter="url(#shadow)">
    <!-- Angular shield -->
    <g transform="translate(315, 178)">
      <polygon points="65,4 126,28 117,108 65,138 13,108 4,28" fill="#1e0a12" stroke="#DD0031" stroke-width="2" opacity="0.8"/>
      <text x="65" y="88" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#DD0031" text-anchor="middle">A</text>
    </g>
    <g transform="translate(480, 185)">
      <rect x="0" y="0" width="140" height="130" rx="22" fill="#12223a"/>
      <rect x="0" y="0" width="140" height="130" rx="22" fill="none" stroke="#3178C6" stroke-width="2" opacity="0.6"/>
      <text x="70" y="84" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#3178C6" text-anchor="middle">TS</text>
    </g>
    <g transform="translate(660, 185)">
      <rect x="0" y="0" width="140" height="130" rx="22" fill="#0e2010"/>
      <rect x="0" y="0" width="140" height="130" rx="22" fill="none" stroke="#339933" stroke-width="2" opacity="0.6"/>
      <text x="70" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#339933" text-anchor="middle">Node</text>
      <text x="70" y="95" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#66cc66" text-anchor="middle">.js</text>
    </g>
  </g>
  <text x="600" y="418" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">Angular + TypeScript + Node.js</text>
  <text x="600" y="460" font-family="Arial, sans-serif" font-size="22" fill="#7a8ba8" text-anchor="middle">Service, Schedule and Appointment Management</text>
  <g transform="translate(290, 495)">
    <rect x="0" y="0" width="95" height="36" rx="18" fill="#DD0031" opacity="0.12" stroke="#DD0031" stroke-width="1" stroke-opacity="0.3"/>
    <text x="47" y="23" font-family="Arial, sans-serif" font-size="13" fill="#DD0031" text-anchor="middle">Angular</text>
  </g>
  <g transform="translate(405, 495)">
    <rect x="0" y="0" width="110" height="36" rx="18" fill="#3178C6" opacity="0.12" stroke="#3178C6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="55" y="23" font-family="Arial, sans-serif" font-size="13" fill="#3178C6" text-anchor="middle">TypeScript</text>
  </g>
  <g transform="translate(535, 495)">
    <rect x="0" y="0" width="90" height="36" rx="18" fill="#339933" opacity="0.12" stroke="#339933" stroke-width="1" stroke-opacity="0.3"/>
    <text x="45" y="23" font-family="Arial, sans-serif" font-size="13" fill="#339933" text-anchor="middle">Node.js</text>
  </g>
  <g transform="translate(645, 495)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#764ABC" opacity="0.1" stroke="#764ABC" stroke-width="1" stroke-opacity="0.25"/>
    <text x="60" y="23" font-family="Arial, sans-serif" font-size="13" fill="#764ABC" text-anchor="middle">Material UI</text>
  </g>
  <rect x="200" y="565" width="800" height="1" fill="url(#accent)" opacity="0.15"/>
