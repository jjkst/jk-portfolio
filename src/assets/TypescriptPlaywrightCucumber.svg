<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="40%" style="stop-color:#0d1f2d"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#2EAD33;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#2EAD33;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3178C6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#23D96C;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#23D96C;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
    </pattern>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2EAD33"/>
      <stop offset="50%" style="stop-color:#3178C6"/>
      <stop offset="100%" style="stop-color:#23D96C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Floating shapes -->
  <circle cx="100" cy="120" r="3" fill="#2EAD33" opacity="0.6"/>
  <circle cx="1100" cy="80" r="2" fill="#3178C6" opacity="0.5"/>
  <circle cx="200" cy="600" r="4" fill="#23D96C" opacity="0.4"/>
  <circle cx="950" cy="550" r="3" fill="#2EAD33" opacity="0.3"/>
  <circle cx="80" cy="400" r="2" fill="#3178C6" opacity="0.5"/>
  <circle cx="1120" cy="350" r="3" fill="#23D96C" opacity="0.4"/>
  <rect x="60" y="250" width="40" height="40" rx="8" fill="none" stroke="#2EAD33" stroke-width="1" opacity="0.12" transform="rotate(15 80 270)"/>
  <rect x="1080" y="480" width="50" height="50" rx="10" fill="none" stroke="#3178C6" stroke-width="1" opacity="0.1" transform="rotate(-20 1105 505)"/>
  <polygon points="1050,100 1070,140 1030,140" fill="none" stroke="#23D96C" stroke-width="1" opacity="0.12"/>
  <polygon points="150,520 170,560 130,560" fill="none" stroke="#3178C6" stroke-width="1" opacity="0.1"/>
  <!-- Accent line -->
  <rect x="440" y="148" width="320" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Logo boxes -->
  <g filter="url(#shadow)">
    <g transform="translate(330, 185)">
      <rect x="0" y="0" width="130" height="130" rx="22" fill="#1a2e1e"/>
      <rect x="0" y="0" width="130" height="130" rx="22" fill="none" stroke="#2EAD33" stroke-width="2" opacity="0.6"/>
      <text x="65" y="80" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#2EAD33" text-anchor="middle">Pw</text>
    </g>
    <g transform="translate(500, 185)">
      <rect x="0" y="0" width="130" height="130" rx="22" fill="#162540"/>
      <rect x="0" y="0" width="130" height="130" rx="22" fill="none" stroke="#3178C6" stroke-width="2" opacity="0.6"/>
      <text x="65" y="80" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#3178C6" text-anchor="middle">TS</text>
    </g>
    <g transform="translate(670, 185)">
      <rect x="0" y="0" width="130" height="130" rx="22" fill="#142e1f"/>
      <rect x="0" y="0" width="130" height="130" rx="22" fill="none" stroke="#23D96C" stroke-width="2" opacity="0.6"/>
      <text x="65" y="80" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#23D96C" text-anchor="middle">Cu</text>
    </g>
  </g>
  <!-- Title -->
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle">Playwright + TypeScript + Cucumber</text>
  <text x="600" y="455" font-family="Arial, sans-serif" font-size="22" fill="#7a8ba8" text-anchor="middle">End to End UI Automation Test Suite</text>
  <!-- Tags -->
  <g transform="translate(300, 490)">
    <rect x="0" y="0" width="110" height="36" rx="18" fill="#2EAD33" opacity="0.12" stroke="#2EAD33" stroke-width="1" stroke-opacity="0.3"/>
    <text x="55" y="23" font-family="Arial, sans-serif" font-size="13" fill="#2EAD33" text-anchor="middle">Playwright</text>
  </g>
  <g transform="translate(430, 490)">
    <rect x="0" y="0" width="110" height="36" rx="18" fill="#3178C6" opacity="0.12" stroke="#3178C6" stroke-width="1" stroke-opacity="0.3"/>
    <text x="55" y="23" font-family="Arial, sans-serif" font-size="13" fill="#3178C6" text-anchor="middle">TypeScript</text>
  </g>
  <g transform="translate(560, 490)">
    <rect x="0" y="0" width="110" height="36" rx="18" fill="#23D96C" opacity="0.12" stroke="#23D96C" stroke-width="1" stroke-opacity="0.3"/>
    <text x="55" y="23" font-family="Arial, sans-serif" font-size="13" fill="#23D96C" text-anchor="middle">Cucumber</text>
  </g>
  <g transform="translate(690, 490)">
    <rect x="0" y="0" width="80" height="36" rx="18" fill="#F7DF1E" opacity="0.1" stroke="#F7DF1E" stroke-width="1" stroke-opacity="0.25"/>
    <text x="40" y="23" font-family="Arial, sans-serif" font-size="13" fill="#F7DF1E" text-anchor="middle">BDD</text>
  </g>
  <!-- Bottom line decoration -->
  <rect x="200" y="560" width="800" height="1" fill="url(#accent)" opacity="0.15"/>
</svg>
