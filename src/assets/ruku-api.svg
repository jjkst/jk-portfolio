<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="40%" style="stop-color:#0c0a1e"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#512BD4;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#512BD4;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Browser -->
  <rect x="100" y="40" width="1000" height="600" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="100" y="40" width="1000" height="40" rx="12" fill="#334155"/>
  <rect x="100" y="68" width="1000" height="12" fill="#334155"/>
  <circle cx="128" cy="60" r="7" fill="#ef4444"/>
  <circle cx="152" cy="60" r="7" fill="#f59e0b"/>
  <circle cx="176" cy="60" r="7" fill="#22c55e"/>
  <!-- API Header -->
  <rect x="100" y="80" width="1000" height="50" fill="#512BD4" opacity="0.2"/>
  <text x="150" y="112" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#c4b5fd">RukuService API</text>
  <text x="380" y="112" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">v1.0 | .NET 8 | JWT Auth</text>
  <!-- Endpoints -->
  <rect x="130" y="148" width="940" height="54" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="148" y="162" width="58" height="28" rx="4" fill="#22c55e"/>
  <text x="177" y="181" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GET</text>
  <text x="228" y="182" font-family="monospace, sans-serif" font-size="15" fill="#e2e8f0">/api/services</text>
  <text x="1040" y="182" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">Get all services</text>

  <rect x="130" y="212" width="940" height="54" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="148" y="226" width="58" height="28" rx="4" fill="#3b82f6"/>
  <text x="177" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">POST</text>
  <text x="228" y="246" font-family="monospace, sans-serif" font-size="15" fill="#e2e8f0">/api/services</text>
  <text x="1040" y="246" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">Create a service</text>

  <rect x="130" y="276" width="940" height="54" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="148" y="290" width="58" height="28" rx="4" fill="#22c55e"/>
  <text x="177" y="309" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">GET</text>
  <text x="228" y="310" font-family="monospace, sans-serif" font-size="15" fill="#e2e8f0">/api/availability/{serviceId}</text>
  <text x="1040" y="310" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">Get availability</text>

  <rect x="130" y="340" width="940" height="54" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="148" y="354" width="58" height="28" rx="4" fill="#f59e0b"/>
  <text x="177" y="373" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">PUT</text>
  <text x="228" y="374" font-family="monospace, sans-serif" font-size="15" fill="#e2e8f0">/api/schedules/{id}</text>
  <text x="1040" y="374" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">Update schedule</text>

  <rect x="130" y="404" width="940" height="54" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="148" y="418" width="58" height="28" rx="4" fill="#ef4444"/>
  <text x="177" y="437" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DEL</text>
  <text x="228" y="438" font-family="monospace, sans-serif" font-size="15" fill="#e2e8f0">/api/schedules/{id}</text>
  <text x="1040" y="438" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">Delete schedule</text>

  <rect x="130" y="468" width="940" height="54" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="148" y="482" width="58" height="28" rx="4" fill="#3b82f6"/>
  <text x="177" y="501" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">POST</text>
  <text x="228" y="502" font-family="monospace, sans-serif" font-size="15" fill="#e2e8f0">/api/auth/login</text>
  <text x="1040" y="502" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">JWT authentication</text>

  <!-- Schemas -->
  <rect x="130" y="540" width="940" height="80" rx="6" fill="#0f172a"/>
  <text x="155" y="570" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#94a3b8">Schemas</text>
  <rect x="155" y="582" width="80" height="24" rx="4" fill="#512BD4" opacity="0.2" stroke="#512BD4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="195" y="599" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Service</text>
  <rect x="250" y="582" width="100" height="24" rx="4" fill="#512BD4" opacity="0.2" stroke="#512BD4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="300" y="599" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Availability</text>
  <rect x="365" y="582" width="90" height="24" rx="4" fill="#512BD4" opacity="0.2" stroke="#512BD4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="410" y="599" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Schedule</text>
  <rect x="470" y="582" width="60" height="24" rx="4" fill="#512BD4" opacity="0.2" stroke="#512BD4" stroke-width="1" stroke-opacity="0.3"/>
  <text x="500" y="599" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">User</text>
</svg>
